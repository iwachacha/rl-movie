behaviors:
  GoldenSpineSmokeAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 64
      buffer_size: 512
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 64
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 600
    time_horizon: 32
    summary_freq: 100
    keep_checkpoints: 2
    checkpoint_interval: 200
