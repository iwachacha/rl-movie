behaviors:
  ReactorCoreDeliveryAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 256
      buffer_size: 4096
      learning_rate: 3.0e-4
      beta: 4.5e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 1000000
    time_horizon: 128
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 100000

environment_parameters:
  randomization_strength:
    curriculum:
      - name: WalkUp
        completion_criteria:
          measure: reward
          behavior: ReactorCoreDeliveryAgent
          min_lesson_length: 200
          threshold: 0.18
        value: 0.08
      - name: CoreEscort
        completion_criteria:
          measure: reward
          behavior: ReactorCoreDeliveryAgent
          min_lesson_length: 200
          threshold: 0.62
        value: 0.32
      - name: DeliveryPressure
        value: 0.58

  support_prop_jitter:
