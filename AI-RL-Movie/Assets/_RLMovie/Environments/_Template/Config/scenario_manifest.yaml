scenario_name: __SCENARIO_NAME__
scene_name: __SCENARIO_NAME__
starter_kind: __STARTER_KIND__
agent_class: __AGENT_CLASS__
behavior_name: __BEHAVIOR_NAME__
training_config: __TRAINING_CONFIG_NAME__
runtime_blueprint: scenario_blueprint.yaml
viewer_promise: "A readable hero learns to approach a clear target while the shared recording backbone captures failure and improvement."
learning_goal: "Use the shared core backbone to learn a simple, readable hero-to-target interaction before specializing the scenario."
success_conditions:
  - "The hero reaches the primary target within interactionRadius."
failure_conditions:
  - "The hero falls below the environment fall threshold."
observation_contract:
  vector_size: 13
  items:
    - "hero localPosition (3)"
    - "primary target localPosition (3)"
    - "hero rigidbody linearVelocity (3)"
    - "normalized direction to primary target (3)"
    - "normalized distance to primary target (1)"
action_contract:
  type: continuous
  size: 2
  mapping:
    - "index 0: moveX"
    - "index 1: moveZ"
reward_rules:
  terminal:
    - "Success: +1.0"
    - "Fail: -1.0"
  dense:
    - "progress reward from moving toward the primary target"
  penalties:
    - "small step penalty to encourage efficient movement"
randomization_knobs:
  - name: environmentManager.randomizePositions
    purpose: "Allow the reference starter to vary hero and target start positions."
    default: "true"
  - name: environmentManager.randomizationStrength
    purpose: "Control the spread of randomized spawn positions."
    default: "0.5"
difficulty_stages:
  - name: Baseline
    intent: "Keep the first cut extremely readable."
  - name: ThemeLift
    intent: "Swap visuals or dressing while preserving the same shared backbone."
visual_theme:
  style: "Use the readability kit so hero, target, floor, and hazard are distinguishable immediately."
  readability: "A new viewer should understand actor, objective, and danger without debug UI."
visual_hooks:
  - "One readable hero against one privileged target."
  - "Failures and recoveries remain visible from the explain and wide shots."
  - "The first clean solve can plausibly become the thumbnail or cold open callback."
thumbnail_moment: "Show the hero nearly touching the target with clear surrounding danger or miss risk."
camera_plan:
  default_view: ExplainView
  recording_cuts:
    - ExplainView
    - WideA
    - WideB
    - FollowView
  thumbnail_reference: ExplainView
acceptance_criteria:
  - "The validator passes for the new starter."
  - "The overlay label and objective text are sourced from the manifest instead of generic placeholder text."
  - "The recording helper can resolve explain, wide_a, wide_b, and follow_optional camera roles."
  - "The highlight tracker and training visualizer are wired through the shared backbone."
baseline_run: ""
spec_version: 3
