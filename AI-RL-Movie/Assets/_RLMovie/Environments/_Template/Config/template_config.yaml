# ML-Agents training config for the Golden Spine starter.
# Start here, then adapt rewards, curriculum, and network size for the real scenario.
#
# Usage:
#   mlagents-learn <config.yaml> --run-id=<run_id>
#
# Google Colab:
#   !mlagents-learn /content/config.yaml --run-id=<scenario_run_id> --no-graphics

behaviors:
  TemplateAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 500000
    time_horizon: 64
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 50000

